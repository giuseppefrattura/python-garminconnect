services:
  garmin-api:
    build: .
    container_name: garmin-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GARMINTOKENS=/tokens
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ~/.garminconnect:/tokens:ro
    restart: unless-stopped
